<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎬 TMDB Películas | Populares y Búsqueda</title>
    
    <!-- Bootstrap 5.3 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark border-bottom border-primary">
        <div class="container">
            <a class="navbar-brand fw-bold fs-3" href="#">
                <i class="fa-solid fa-film me-2"></i> TMDB Películas
            </a>
            
            <!-- Caja de búsqueda dinámica -->
            <div class="position-relative flex-grow-1 mx-4" style="max-width: 520px;">
                <div class="input-group">
                    <span class="input-group-text bg-dark text-light"><i class="fa-solid fa-magnifying-glass"></i></span>
                    <input id="search-input" 
                           type="text" 
                           class="form-control bg-dark text-light border-primary"
                           placeholder="Buscar películas... (mínimo 3 caracteres)">
                </div>
                
                <!-- Dropdown autodesplegable -->
                <div id="search-dropdown" 
                     class="list-group position-absolute w-100 mt-1 shadow-lg"
                     style="display: none; max-height: 420px; overflow-y: auto; z-index: 1050; border-radius: 8px;">
                </div>
            </div>
            
            <button onclick="resetToPopular()" class="btn btn-outline-primary">
                <i class="fa-solid fa-rotate-right me-1"></i> Populares
            </button>
        </div>
    </nav>

    <div class="container py-5">
        <h1 id="page-title" class="display-5 fw-bold text-light mb-4 text-center">🎥 Películas Populares</h1>
        
        <!-- Contenedor de tarjetas (4 por fila en pantallas grandes) -->
        <div id="results" class="row row-cols-1 row-cols-md-2 row-cols-lg-4 g-4"></div>
        
        <!-- Paginación -->
        <div id="pagination" class="d-flex justify-content-center mt-5"></div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module" src="main.js"></script>
</body>
</html>
